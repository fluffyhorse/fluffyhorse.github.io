<html>
  <script>
  function add_wood(){
    wood=wood+1;
  }
  function start(){
    wood=0;
    document.write('<center><button onclick="game();">Игра</button><button onclick="invy();">Инветнарь</button><div id="windows"><img  onclick="add_wood();" src="img/Куст.png" width="100" height="100"></div></center>');
  }
  function game(){
    windows.innerHTML='<img  onclick="add_wood();" src="img/Куст.png" width="100" height="100">';
  }
  function invy(){
    windows.innerHTML="Дерево:"+ wood;
    
  }
</script>
<body>
  <center>
  <button onclick="start();">Старт</button>
  </center>
